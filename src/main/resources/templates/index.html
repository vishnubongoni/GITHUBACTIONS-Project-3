<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NeoShop 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<!-- NAV -->
<nav class="nav">
    <div class="logo">NeoShop 💖</div>

    <div class="menu">
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Offers</a>
    </div>

    <div class="auth">
        <button id="loginBtn">Login</button>
        <button id="logoutBtn" style="display:none;">Logout</button>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Shop the Future</h1>
    <p>Best Deals on Tech & Fashion</p>
    <button>Start Shopping</button>
</section>

<!-- OFFERS -->
<section class="offers">
    <div class="carousel">
        <div class="slide">
            <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da">
            <h2>🔥 Mega Sale 50%</h2>
        </div>

        <div class="slide">
            <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
            <h2>💖 Fashion Deals</h2>
        </div>

        <div class="slide">
            <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
            <h2>⚡ Tech Fest</h2>
        </div>
    </div>
</section>

<!-- PRODUCTS -->
<section class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1518444028785-8f1f5b66c9aa">
        <h3>Headphones Pro</h3>
        <p>$59</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
        <h3>Smart Watch</h3>
        <p>$89</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1587825140708-dfaf72ae4b04">
        <h3>Gaming Mouse</h3>
        <p>$29</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1593642532400-2682810df593">
        <h3>Keyboard</h3>
        <p>$79</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
        <h3>Laptop</h3>
        <p>$999</p>
    </div>

</section>

<script src="/js/app.js"></script>
</body>
</html>
